<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التسجيل - OneWorld SatNet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', Arial, sans-serif; margin:0; background:#f4f8fb; color:#222;}
        header { background:#003366; color:#fff; padding:1.5em; text-align:center;}
        .signup-form { background:#fff; max-width:400px; margin:2em auto; border-radius:12px; box-shadow:0 2px 8px #00336622; padding:2em;}
        .signup-form input, .signup-form select { width:100%; padding:0.8em; margin-bottom:1em; border-radius:8px; border:1px solid #c2e9fb;}
        .signup-form button { background:linear-gradient(90deg,#0077cc 60%,#00c6ff 100%); color:#fff; border:none; border-radius:30px; padding:0.8em 2em; font-size:1.1em; font-weight:700; cursor:pointer;}
        .signup-form button:hover { background:linear-gradient(90deg,#005fa3 60%,#0099cc 100%);}
    </style>
</head>
<body>
    <header>
        <h1>التسجيل في OneWorld SatNet</h1>
        <a href="index.html" style="color:#fff;">العودة للصفحة الرئيسية</a>
    </header>
    <form class="signup-form">
        <input type="text" name="name" placeholder="الاسم الكامل" required>
        <input type="email" name="email" placeholder="البريد الإلكتروني" required>
        <input type="tel" name="phone" placeholder="رقم الجوال" required>
        <select name="plan" required>
            <option value="">اختر الباقة</option>
            <option value="basic">الأساسية</option>
            <option value="plus">بلس</option>
            <option value="pro">برو</option>
        </select>
        <button type="submit">سجل الآن</button>
    </form>
    <script>
        // إضافة حدث الإرسال للنموذج
        document.querySelector('.signup-form').addEventListener('submit', function(e) {
            e.preventDefault(); // منع الإرسال الافتراضي للنموذج

            // هنا يمكنك إضافة الكود الخاص بمعالجة البيانات المدخلة، مثل إرسالها إلى الخادم

            alert('تم التسجيل بنجاح!'); // رسالة تأكيدية
        });
    </script>
</body>
</html>
